<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%"  stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </radialGradient>
    <linearGradient id="stroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="100" fill="url(#bg)"/>
  <g fill="none" stroke="url(#stroke)" stroke-width="1.4" stroke-linecap="round" opacity="0.85">
    <circle cx="60"  cy="70"  r="6" fill="url(#stroke)"/>
    <circle cx="140" cy="60"  r="6" fill="url(#stroke)"/>
    <circle cx="100" cy="110" r="8" fill="url(#stroke)"/>
    <circle cx="55"  cy="140" r="6" fill="url(#stroke)"/>
    <circle cx="150" cy="140" r="6" fill="url(#stroke)"/>
    <line x1="60"  y1="70"  x2="100" y2="110"/>
    <line x1="140" y1="60"  x2="100" y2="110"/>
    <line x1="100" y1="110" x2="55"  y2="140"/>
    <line x1="100" y1="110" x2="150" y2="140"/>
    <line x1="60"  y1="70"  x2="140" y2="60"  stroke-dasharray="2 3"/>
    <line x1="55"  y1="140" x2="150" y2="140" stroke-dasharray="2 3"/>
  </g>
</svg>
